# 内存过大在 8~16G 机器上易换页，表现为 assembleDebug「卡住」；可按机器改为 4096m / 6144m
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false
android.useAndroidX=true
# R8 全模式，进一步压缩 dex
android.enableR8.fullMode=true
kotlin.daemon.jvmargs=-Xmx2048m
